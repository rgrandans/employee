x-php: &php
    build: ./api/docker/dev/php-fpm/.
    restart: on-failure
    volumes:
        - ./api:/var/www/html
        - ./api/docker/dev/php-fpm/php.ini:/usr/local/etc/php/conf.d/php.ini:ro
    networks:
        - internal

services:
    nginx:
        image: nginx:1.29-alpine
        restart: on-failure
        ports:
            - "8081:80"
        volumes:
            - ./api:/usr/share/nginx/html
            - ./api/docker/dev/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
        networks:
            - internal

    php-fpm:
        <<: *php

    web:
        working_dir: /app
        build:
            context: .
            dockerfile: web/docker/dev/Dockerfile
        volumes:
            - ./web:/app
            - /app/node_modules
        ports:
            - "5173:5173"
        command: [ "npm", "run", "dev", "--", "--host" ]
        environment:
            - CHOKIDAR_USEPOLLING=true
        networks:
            - internal

    db:
        image: postgres:18.3-alpine
        ports:
            - "5434:5432"
        restart: on-failure
        environment:
            POSTGRES_USER: api
            POSTGRES_PASSWORD: api
            POSTGRES_DB: api
        volumes:
            - pgsql-data:/var/lib/postgresql
        networks:
            - internal

    composer:
        image: composer:2.9
        volumes:
            - ./api:/app
        command: [ "install", "--ignore-platform-reqs", "--no-interaction", "--prefer-dist", "--no-ansi", "--no-progress", "--no-scripts" ]
        networks:
            - internal

volumes:
    pgsql-data:

networks:
    internal:
        driver: bridge